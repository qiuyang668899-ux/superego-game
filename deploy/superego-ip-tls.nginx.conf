server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 8.152.201.187;

    ssl_certificate /etc/letsencrypt/live/8.152.201.187/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/8.152.201.187/privkey.pem;
    ssl_session_cache shared:SUPEREGO_TLS:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/superego-ip-ssl.access.log;
    error_log /var/log/nginx/superego-ip-ssl.error.log warn;
    client_max_body_size 64k;

    return 308 https://mortals.online$request_uri;
}
