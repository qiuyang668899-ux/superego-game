server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mortals.online;

    ssl_certificate /etc/letsencrypt/live/mortals.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mortals.online/privkey.pem;
    ssl_session_cache shared:SUPEREGO_DOMAIN_TLS:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/superego-domain-ssl.access.log;
    error_log /var/log/nginx/superego-domain-ssl.error.log warn;
    client_max_body_size 128k;

    location / {
        proxy_pass http://127.0.0.1:4175;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 65s;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.mortals.online;

    ssl_certificate /etc/letsencrypt/live/mortals.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mortals.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://mortals.online$request_uri;
}
