server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mortals.online;

    ssl_certificate /etc/letsencrypt/live/mortals.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mortals.online/privkey.pem;
    ssl_session_cache shared:SUPEREGO_DOMAIN_TLS:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; media-src 'self'; worker-src 'self' blob:; manifest-src 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    access_log /var/log/nginx/superego-domain-ssl.access.log;
    error_log /var/log/nginx/superego-domain-ssl.error.log warn;
    client_max_body_size 64k;

    location / {
        proxy_pass http://127.0.0.1:4175;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 65s;

    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.mortals.online;

    ssl_certificate /etc/letsencrypt/live/mortals.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mortals.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    return 301 https://mortals.online$request_uri;
}
